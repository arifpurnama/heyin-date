<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heyin Date</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card rounded-3xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="bg-indigo-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Date Time Converter Online</h1>
        </div>

        <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6">
            <p class="text-xs font-semibold text-blue-700 uppercase tracking-wider mb-1">Aturan Dasar:</p>
            <p class="text-sm text-blue-800 italic">"11 Maret 2026 = 25 Mei 2032"</p>
        </div>

        <div class="space-y-6">
            <!-- Input Tanggal Standar -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Pilih Tanggal Standar</label>
                <input type="date" id="standardDate" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition duration-200 outline-none">
            </div>

            <div class="flex justify-center py-2">
                <div class="bg-gray-100 p-2 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                    </svg>
                </div>
            </div>

            <!-- Output Tanggal Kustom -->
            <div class="relative">
                <label class="block text-sm font-medium text-gray-700 mb-2">Hasil Konversi (Waktu Kustom)</label>
                <div id="customDateDisplay" class="w-full px-4 py-4 bg-indigo-600 rounded-xl text-white font-bold text-lg text-center shadow-lg transition-all duration-300">
                    -- --- ----
                </div>
            </div>

            <div id="message" class="text-center text-xs text-gray-400">
                Pilih tanggal di atas untuk melihat perubahan
            </div>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-100 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">dibuat oleh Arif Purnama menggunakan AI</p>
        </div>
    </div>

    <script>
        // Definisi Konstanta Berdasarkan Aturan User
        // 11 Maret 2026 (Standard) -> 25 Mei 2032 (Custom)
        const REF_STANDARD = new Date(2026, 2, 11); // Bulan di JS 0-indexed (2 = Maret)
        const REF_CUSTOM = new Date(2032, 4, 25);   // (4 = Mei)

        // Hitung selisih dalam milidetik
        const TIME_OFFSET = REF_CUSTOM.getTime() - REF_STANDARD.getTime();

        const inputEl = document.getElementById('standardDate');
        const displayEl = document.getElementById('customDateDisplay');
        const messageEl = document.getElementById('message');

        function formatDate(date) {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('id-ID', options);
        }

        function convertTime() {
            const selectedValue = inputEl.value;
            if (!selectedValue) return;

            const standardDate = new Date(selectedValue);
            
            // Terapkan offset ke tanggal yang dipilih
            const customTime = standardDate.getTime() + TIME_OFFSET;
            const customDate = new Date(customTime);

            // Update UI
            displayEl.textContent = formatDate(customDate);
            displayEl.classList.add('scale-105');
            setTimeout(() => displayEl.classList.remove('scale-105'), 200);
            
            messageEl.innerHTML = `Selisih waktu tetap terjaga secara sinkron`;
        }

        // Event Listener
        inputEl.addEventListener('change', convertTime);

        // Set default ke tanggal referensi (11 Maret 2026)
        window.onload = () => {
            const defaultDate = "2026-03-11";
            inputEl.value = defaultDate;
            convertTime();
        };
    </script>
</body>
</html>
