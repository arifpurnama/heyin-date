<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Time Converter Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menggunakan Montserrat sebagai alternatif Metropolis yang paling identik secara geometris */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');
        
        :root {
            --fx-ink: #2b1141; 
            --fx-ink-light: #3e205a;
            --fx-orange: #ff7139;
            --fx-white: #ffffff;
        }

        body {
            /* Menerapkan font Metropolis (Montserrat) ke seluruh dokumen */
            font-family: 'Montserrat', sans-serif;
            background-color: var(--fx-ink);
            color: var(--fx-white);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .fx-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 10%, #462565 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #200b30 0%, transparent 40%);
        }

        .container-box {
            max-width: 900px;
            width: 100%;
            padding: 2rem;
            text-align: center;
        }

        /* Hero Text - Metropolis Bold Style */
        .hero-title {
            font-weight: 900;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            line-height: 1.05;
            letter-spacing: -0.05em;
            margin-bottom: 1.5rem;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            color: #d1d1e0;
            max-width: 600px;
            margin: 0 auto 3rem;
            line-height: 1.6;
        }

        .fx-card {
            background-color: var(--fx-ink-light);
            border-radius: 28px;
            padding: 3rem;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .fx-input-label {
            display: block;
            font-weight: 800;
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
            color: #b1a1c6;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .fx-input {
            width: 100%;
            background-color: var(--fx-ink);
            border: 2px solid #5a3d7a;
            border-radius: 14px;
            padding: 1rem 1.25rem;
            color: white;
            font-size: 1.125rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .fx-input:focus {
            border-color: var(--fx-orange);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 113, 57, 0.2);
        }

        .fx-result {
            background: linear-gradient(90deg, #ff7139, #ff4f5e);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            color: white;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 113, 57, 0.2);
        }

        .result-date {
            font-weight: 900;
            font-size: 2.25rem;
            letter-spacing: -0.03em;
        }

        .fx-footer {
            margin-top: 4rem;
            font-size: 0.875rem;
            color: #8f8fb0;
        }

        .fx-footer b {
            color: white;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-top: 1.5rem;
        }

        input::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="fx-background"></div>

    <div class="container-box">
        <header>
            <h1 class="hero-title">Konversi tanggal<br>untuk mesin heyin.</h1>
            <p class="hero-subtitle">
                Pemetaan data sistem penanggalan kustom yang dioptimalkan untuk kebutuhan spesifik mesin Heyin.
            </p>
        </header>

        <main class="max-w-md mx-auto">
            <div class="fx-card">
                <div class="space-y-6">
                    <!-- Bagian Input -->
                    <div>
                        <label class="fx-input-label">Tanggal Saat Ini</label>
                        <input type="date" id="standardDate" class="fx-input">
                    </div>

                    <!-- Ikon Panah -->
                    <div class="flex justify-center py-2">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-orange-400">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <polyline points="19 12 12 19 5 12"></polyline>
                        </svg>
                    </div>

                    <!-- Bagian Hasil -->
                    <div>
                        <label class="fx-input-label">Hasil Konversi</label>
                        <div class="fx-result">
                            <span id="customDateDisplay" class="result-date">-- --- ----</span>
                        </div>
                    </div>

                    <!-- Label Ketentuan -->
                    <div class="text-center mt-4">
                        <span class="text-[10px] font-extrabold text-indigo-300 opacity-60 uppercase tracking-[0.2em]">
                            Ketentuan 11.03.2026 = 25.05.2032
                        </span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="fx-footer">
            <p>Dibuat oleh <b>Arif Purnama</b> menggunakan AI</p>
            <div class="badge">SISTEM KALENDER V4.0</div>
        </footer>
    </div>

    <script>
        const REF_STANDARD = new Date(2026, 2, 11); 
        const REF_CUSTOM = new Date(2032, 4, 25);   
        const TIME_OFFSET = REF_CUSTOM.getTime() - REF_STANDARD.getTime();

        const inputEl = document.getElementById('standardDate');
        const displayEl = document.getElementById('customDateDisplay');

        function formatDate(date) {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('id-ID', options);
        }

        function convertTime() {
            const selectedValue = inputEl.value;
            if (!selectedValue) return;

            const standardDate = new Date(selectedValue);
            standardDate.setHours(12, 0, 0, 0);
            
            const customTime = standardDate.getTime() + TIME_OFFSET;
            const customDate = new Date(customTime);

            // Efek transisi sederhana
            displayEl.style.opacity = '0';
            setTimeout(() => {
                displayEl.textContent = formatDate(customDate);
                displayEl.style.opacity = '1';
            }, 100);
        }

        inputEl.addEventListener('change', convertTime);

        window.onload = () => {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            inputEl.value = todayStr;
            convertTime();
        };
    </script>
</body>
</html>
